name: TenantIQ Eval Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cache HuggingFace models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: huggingface-all-MiniLM-L6-v2

      - name: Install dependencies
        run: |
          pip install anthropic langchain langgraph chromadb \
                      sentence-transformers python-dotenv \
                      requests beautifulsoup4 pypdf \
                      prometheus-client fastapi uvicorn

      - name: Build knowledge base
        run: python build_kb.py

      - name: Run evaluation
        run: python eval.py

      - name: Compare results to baseline
        id: compare
        run: python compare_eval.py

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('eval_comment.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload eval results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results.json